name: Event Data Deploy

# Validation gate for event-data PRs (#369).
#
# API submissions validate at request time, but this PR check is the
# branch-protection backstop: it re-runs the YAML schema validator
# (lint-yaml.js) and the security scanner (check-yaml-security.js) against
# every changed per-camp event file, so malformed or unsafe YAML cannot reach
# main even via a hand-opened PR or a path the API missed. Build and deploy
# run post-merge (event-data-deploy-post-merge.yml).

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - 'source/data/**.yaml'

jobs:
  check:
    name: Event data check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the diff against the PR base resolves (CL-§9.5).
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine changed per-camp event files
        id: changed
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          # Per-camp event files only. camps.yaml / local.yaml are config, not
          # event data, and are validated by full CI (CL-§9.4).
          files=$(git diff --name-only "$base" HEAD -- 'source/data/*.yaml' \
            | grep -vE '(^|/)(camps|local)\.yaml$' || true)
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$files" ]; then echo "has_files=true" >> "$GITHUB_OUTPUT"; else echo "has_files=false" >> "$GITHUB_OUTPUT"; fi

      - name: Validate schema and security of changed event files
        if: steps.changed.outputs.has_files == 'true'
        run: |
          set -uo pipefail
          # Iterate via a here-string (not a pipe) so the loop runs in this
          # shell and a validation failure reliably fails the job — the whole
          # point of the gate (#369). Track failures explicitly and exit
          # non-zero if any file fails a blocking validator.
          #
          # Scope (legacy data, #369): the security scanner is a HARD block for
          # every changed per-camp file. The schema validator hard-blocks files
          # belonging to non-archived camps, but is advisory for archived camps
          # — their data predates the current required-field schema and is
          # immutable history, so blocking edits to it would make the gate
          # unusable. New submissions are schema-validated at the API layer
          # before the PR is opened, so active-camp data is still enforced here.
          active="$(node -e "const y=require('js-yaml'),fs=require('fs');const d=y.load(fs.readFileSync('source/data/camps.yaml','utf8'));(d.camps||[]).filter(c=>!c.archived).forEach(c=>console.log('source/data/'+c.file))")"
          status=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "Skipping deleted file: $f"
              continue
            fi
            echo "Validating $f"
            node source/scripts/check-yaml-security.js "$f" || status=1
            if printf '%s\n' "$active" | grep -qxF "$f"; then
              node source/scripts/lint-yaml.js "$f" || status=1
            else
              echo "::notice::$f belongs to an archived camp; schema check is advisory (security scan still enforced)"
              node source/scripts/lint-yaml.js "$f" || echo "::warning::schema issues in archived file $f (not blocking)"
            fi
          done <<EOF
          ${{ steps.changed.outputs.files }}
          EOF
          exit $status

      - name: No event-data files changed
        if: steps.changed.outputs.has_files != 'true'
        run: echo "No per-camp event files changed; nothing to validate."
