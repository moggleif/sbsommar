name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      build_env:
        required: false
        type: string
        description: 'Override BUILD_ENV (defaults to environment name)'
      build_version:
        required: false
        type: string
        description: 'Version string to embed in footer (e.g. "1.0.4" or "1.0.4 – QA PR212")'

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          API_URL: ${{ secrets.API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BUILD_ENV: ${{ inputs.build_env || inputs.environment }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          BUILD_VERSION: ${{ inputs.build_version }}
          GOATCOUNTER_SITE_CODE: ${{ secrets.GOATCOUNTER_SITE_CODE }}

      - name: Package site for upload
        run: tar -czf site.tar.gz -C public .

      - name: Upload site archive via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: site.tar.gz
          target: ${{ secrets.DEPLOY_DIR }}

      # Zero-downtime swap: extract into staging dir, then swap with two mv
      # ops. The PHP API .env lives outside public_html at $DEPLOY_DIR/.env
      # (§100), so the swap never touches it.
      # Stale dirs from previous failed deploys are cleaned first.
      - name: Deploy with zero-downtime swap
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            RELEASE_DIR="$DEPLOY_DIR/release_new"
            PUBLIC_DIR="$DEPLOY_DIR/public_html"

            # Clean up any previous failed deploy
            rm -rf "$RELEASE_DIR" "$DEPLOY_DIR/public_html_old"

            # Extract new release
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$DEPLOY_DIR/site.tar.gz" -C "$RELEASE_DIR"
            rm "$DEPLOY_DIR/site.tar.gz"

            # The PHP API .env lives outside the web root at $DEPLOY_DIR/.env
            # (§100). One-time migration: if the canonical file is missing but
            # a legacy in-web-root copy exists, move it out before the swap
            # wipes the old public_html.
            if [ ! -f "$DEPLOY_DIR/.env" ] && [ -f "$PUBLIC_DIR/api/.env" ]; then
              mv "$PUBLIC_DIR/api/.env" "$DEPLOY_DIR/.env"
            fi

            # Swap (millisecond downtime)
            if [ -d "$PUBLIC_DIR" ]; then
              mv "$PUBLIC_DIR" "$DEPLOY_DIR/public_html_old"
            fi
            mv "$RELEASE_DIR" "$PUBLIC_DIR"

            # Cleanup
            rm -rf "$DEPLOY_DIR/public_html_old"

      # Ship camp metadata alongside the API so the PHP time-gating can always
      # resolve the active camp from disk and never fail open (#370). The API
      # reads api/data/camps.yaml first, then the repo source path.
      - name: Bundle camp metadata into API package
        run: mkdir -p api/data && cp source/data/camps.yaml api/data/camps.yaml

      - name: Package PHP API for upload
        run: tar -czf api.tar.gz --exclude='.env' --exclude='.env.example' --exclude='vendor' -C api .

      - name: Upload API archive via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: api.tar.gz
          target: ${{ secrets.DEPLOY_DIR }}

      - name: Deploy PHP API
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            PUBLIC_DIR="$DEPLOY_DIR/public_html"
            API_STAGING="$DEPLOY_DIR/api_new"

            # Clean up any previous failed deploy
            rm -rf "$API_STAGING"

            # Extract new API files
            mkdir -p "$API_STAGING"
            tar -xzf "$DEPLOY_DIR/api.tar.gz" -C "$API_STAGING"
            rm "$DEPLOY_DIR/api.tar.gz"

            # No .env is placed under public_html — the PHP API loads it from
            # $DEPLOY_DIR/.env, outside the web root (§100).

            # Install PHP dependencies
            cd "$API_STAGING"
            composer install --no-dev --no-interaction --optimize-autoloader

            # Swap
            rm -rf "$PUBLIC_DIR/api_old"
            if [ -d "$PUBLIC_DIR/api" ]; then
              mv "$PUBLIC_DIR/api" "$PUBLIC_DIR/api_old"
            fi
            mv "$API_STAGING" "$PUBLIC_DIR/api"

            # Cleanup
            rm -rf "$PUBLIC_DIR/api_old"
