name: Event Data Deploy (Post-Merge)

# Builds and deploys event-data pages after an event PR merges to main.
# Uses setup-node with npm cache to install only production dependencies.
#
# All deploy jobs start immediately in parallel — no serial detect job.
# Each job performs its own inline detection of changed event data files.
#
# Jobs:
#   1. deploy-qa      – detect inline + build + rsync to QA
#   2. deploy-prod    – detect inline + QA check + build + SCP to Production
#   3. close-redundant-event-prs – close duplicate event PRs made redundant by
#                                  this merge (02-§111.6–111.9)
#   4. recover-stranded-event-prs – re-enqueue event PRs stranded in the merge
#                                   queue by this merge's base move (02-§112.7)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'source/data/**.yaml'

jobs:
  deploy-qa:
    name: Build & deploy to QA
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          fetch-tags: true

      - name: Detect changed event data file
        id: gate
        run: |
          CHANGED=$(git diff --name-only HEAD~1..HEAD \
            | grep '^source/data/' | grep '\.yaml$' \
            | grep -v 'camps\.yaml' | grep -v 'local\.yaml' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No event YAML file changed"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Detected changed file: $CHANGED"
          fi

      # Compute the version string to embed in the footer so event-data pages
      # (schema.html, idag.html, kalender.html, per-event pages) show the same
      # version as every other page on QA. Mirrors deploy-qa.yml: full semver
      # from the latest tag plus the QA PR suffix (02-§62.9, 02-§62.20).
      - name: Compute version string
        id: version
        if: steps.gate.outputs.skip != 'true'
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          LATEST=$(git tag --list "v${BASE}.*" --sort=-version:refname | head -1)
          if [ -n "$LATEST" ]; then
            FULL_VER=$(echo "$LATEST" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          else
            FULL_VER="${BASE}.0"
          fi
          PR_NUM=$(git log -1 --pretty=format:"%s" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -n "$PR_NUM" ]; then
            VERSION_STR="${FULL_VER} – QA PR${PR_NUM}"
          else
            SHA=$(git rev-parse --short HEAD)
            VERSION_STR="${FULL_VER} – QA ${SHA}"
          fi
          echo "build_version=${VERSION_STR}" >> $GITHUB_OUTPUT
          echo "QA version: ${VERSION_STR}"

      - uses: actions/setup-node@v6
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci --omit=dev

      - name: Build site
        if: steps.gate.outputs.skip != 'true'
        run: node source/build/build.js
        env:
          API_URL: ${{ secrets.API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BUILD_ENV: qa
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          GOATCOUNTER_SITE_CODE: ${{ secrets.GOATCOUNTER_SITE_CODE }}

      - name: Stage event data pages
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p staging
          for FILE in schema.html idag.html live.html dagens-schema.html events.json schema.rss schema.ics kalender.html; do
            if [ -f "public/$FILE" ]; then
              cp "public/$FILE" "staging/$FILE"
              echo "Staged: $FILE"
            fi
          done
          if [ -d "public/schema" ]; then
            find public/schema \( -name 'index.html' -o -name 'event.ics' \) | while read -r PAGE; do
              REL="${PAGE#public/}"
              mkdir -p "staging/$(dirname "$REL")"
              cp "$PAGE" "staging/$REL"
              echo "Staged: $REL"
            done
          fi

      - name: Upload event data pages via rsync
        if: steps.gate.outputs.skip != 'true'
        run: |
          install -m 600 /dev/null deploy_key
          echo "${{ secrets.SERVER_SSH_KEY }}" > deploy_key
          rsync -avz \
            -e "ssh -p ${{ secrets.SERVER_SSH_PORT }} -o StrictHostKeyChecking=no -i deploy_key" \
            staging/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_DIR }}/public_html/
          rm -f deploy_key

  deploy-prod:
    name: Build & deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Detect changed event data file and check QA status
        id: gate
        run: |
          CHANGED=$(git diff --name-only HEAD~1..HEAD \
            | grep '^source/data/' | grep '\.yaml$' \
            | grep -v 'camps\.yaml' | grep -v 'local\.yaml' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No event YAML file changed"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            # A change may be a camp file or a fragment under source/data/<stem>/;
            # map it back to the camp file so QA gating works for both (02-§109.22).
            CAMPFILE=$(node source/scripts/changed-camp-file.js "$CHANGED")
            IS_QA=$(CAMPFILE="$CAMPFILE" node -e "
              const fs = require('fs');
              const yaml = require('js-yaml');
              const camps = yaml.load(fs.readFileSync('source/data/camps.yaml','utf8'));
              const match = camps.camps.find(c => c.file === process.env.CAMPFILE);
              console.log(match && match.qa === true ? 'true' : 'false');
            ")
            if [ "$IS_QA" = "true" ]; then
              echo "File $CAMPFILE belongs to QA camp — skipping production deploy"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "Detected changed file: $CHANGED (camp $CAMPFILE, not QA)"
            fi
          fi

      # Compute the version string to embed in the footer so event-data pages
      # (schema.html, idag.html, kalender.html, per-event pages) show the same
      # version as every other page on production: the full semver from the
      # latest tag, e.g. 1.0.4 (02-§62.9, 02-§62.20).
      - name: Compute version string
        id: version
        if: steps.gate.outputs.skip != 'true'
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          LATEST=$(git tag --list "v${BASE}.*" --sort=-version:refname | head -1)
          if [ -n "$LATEST" ]; then
            FULL_VER=$(echo "$LATEST" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          else
            FULL_VER="${BASE}.0"
          fi
          echo "build_version=${FULL_VER}" >> $GITHUB_OUTPUT
          echo "Production version: ${FULL_VER}"

      - name: Build site
        if: steps.gate.outputs.skip != 'true'
        run: node source/build/build.js
        env:
          API_URL: ${{ secrets.API_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BUILD_ENV: production
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          GOATCOUNTER_SITE_CODE: ${{ secrets.GOATCOUNTER_SITE_CODE }}

      - name: Stage event data pages
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p staging
          for FILE in schema.html idag.html live.html dagens-schema.html events.json schema.rss schema.ics kalender.html; do
            if [ -f "public/$FILE" ]; then
              cp "public/$FILE" "staging/$FILE"
              echo "Staged: $FILE"
            fi
          done
          if [ -d "public/schema" ]; then
            find public/schema \( -name 'index.html' -o -name 'event.ics' \) | while read -r PAGE; do
              REL="${PAGE#public/}"
              mkdir -p "staging/$(dirname "$REL")"
              cp "$PAGE" "staging/$REL"
              echo "Staged: $REL"
            done
          fi

      - name: Upload event data pages via SCP
        if: steps.gate.outputs.skip != 'true'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: staging/*
          target: ${{ secrets.DEPLOY_DIR }}/public_html
          strip_components: 1

  close-redundant-event-prs:
    name: Close redundant duplicate event PRs
    runs-on: ubuntu-latest
    # Needs write access to close a pull request and delete its branch; the
    # default workflow token is read-only here (02-§111.7).
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # When a duplicate's first identical submission merged in this push, the
      # second pull request now has an empty net diff against main. Close it and
      # delete its branch so no maintainer has to (02-§111.6–111.9). Uses the
      # pre-installed gh CLI; no dependency install needed.
      - name: Close event PRs made redundant by this merge
        run: node source/scripts/close-redundant-event-prs.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  recover-stranded-event-prs:
    name: Recover event PRs stranded in the merge queue
    runs-on: ubuntu-latest
    # Shared with merge-queue-recovery.yml so all recovery triggers are single-flight;
    # cancel-in-progress is false so a mid-toggle run is never cancelled (02-§112.17).
    concurrency:
      group: stranded-recovery
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # This merge just advanced main, which is exactly the base move that can
      # strand a sibling event PR's auto-merge. Re-enqueue any stranded event PR
      # by toggling auto-merge off then on (02-§112.7). The default GITHUB_TOKEN
      # cannot run the auto-merge GraphQL mutations ("Resource not accessible by
      # integration"), so this uses EVENT_AUTOMERGE_TOKEN — a repo-level secret
      # with pull-request + contents write access (02-§112.12, 112.14). Uses the
      # pre-installed gh CLI; no dependency install needed.
      - name: Recover stranded event PRs
        run: node source/scripts/recover-stranded-event-prs.js
        env:
          GITHUB_TOKEN: ${{ secrets.EVENT_AUTOMERGE_TOKEN }}
          GH_REPO: ${{ github.repository }}
