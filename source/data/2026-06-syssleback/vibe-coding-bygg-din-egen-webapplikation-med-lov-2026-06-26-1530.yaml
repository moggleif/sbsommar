  description: |
    Andra tillfället (nya deltagare välkomna): Kom och testa att skapa en egen webbapp, eller jobba vidare med den du påbörjat. Vi testar hur man utan att kunna skriva en rad kod kan skapa sig en fullt fungerande webapplikation, bara genom att beskriva vad man vill göra. Det spelar ingen roll om du har erfarenhet sedan tidigare eller aldrig hört talas om vibe coding, vi lär oss av varandra.
    
    Skicka gärna din mailadress innan till amanda.gruneau@gmail.com så kan vi lägga till dig för att komma åt Lovable direkt så slipper vi lägga till på plats.
    
    Har du en dator så ta med den, har du ingen så kan man jobba i grupp. Det funkar också att köra med mobil om man inte har tillgång till dator.
