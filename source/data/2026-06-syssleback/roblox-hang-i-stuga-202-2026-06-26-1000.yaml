  title: INSTÄLLT Roblox-häng i stuga 202
  date: '2026-06-26'
  start: '10:00'
  end: '12:00'
  location: Annat
  responsible: Dante och Sylve Naeslund
  description: |
    Vi ses för att spela spel i Roblox! Du kan välja mellan att spela själv i ett spel du väljer eller att spela i samma spel som någon annan, det kommer vi överens om när vi spelar.
    
    Ta med en egen enhet att spela på, tex iPad eller telefon. Du behöver ha tillgång till internet. Det är bra om du har ordnat en inloggning i förväg, det är nog bara en vårdnadshavare som kan ordna det om du inte är myndig.
    
    Ta gärna med en vuxen om du vet med dig att det kan bli starka känslor kring spelande ♥️
    
    Regler: Vi ser till att alla trivs och hjälper varandra så mycket vi kan! Vi respekterar allas val av spel och säger inte att något visst spel är "ute", "sämst" eller liknande. 
    
    Välkomna!
    
