  title: Schacktävling Blixt
  date: '2026-06-27'
  start: '13:30'
  end: '16:00'
  location: Kaffetält
  responsible: Hampus Sommerfeld
  description: |
    Tävling i blixtschack med tidskontroll 5|3, det innebär att man börjar med fem minuter var och får tre sekunder för varje drag man gör. Fyra rundor spelas efter varandra följt av en 15 minuter lång paus innan resterande fyra rundor spelas. Det är inte obligatoriskt att delta i samtliga rundor, man kan vara med några rundor här och där. Värt att notera är att poäng utdelas för närvaro vid en runda. Om du anmäler dig får du plats i samtliga rundor. Vid anmälan ber jag om för- och efternamn för att kunna skilja på olika personer skulle fler än en med samma namn anmäla sig. Ni kan skicka er anmälan till mig privat via +46 79 339 79 38 alternativ använda Messenger på Facebook, eller kommentera på det länkade inlägget. Vidare kan ni anmäla er på plats innan en runda börjar. 
    
    Alla med grundläggande kunskaper inom schack är välkomna! Information finns även i den länkade facebook-tråden.
    
