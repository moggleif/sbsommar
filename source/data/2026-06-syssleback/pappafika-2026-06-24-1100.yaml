  description: |
    Att vara pappa kan vara både det bästa man har varit med om och det absolut jobbigaste – ofta båda två på samma gång. Vi delar erfarenheter och rör oss kring ämnen som förväntningar, gamla och nya normer, papparollen och om föräldraskap för ett särskilt begåvat barn kan kräva något extra av en?
    
    Ta med en kopp kaffe och kom och lyssna och/eller dela med dig. Vi ses utan barn.
    
    Moderator: Stephan Naeslund
