  title: Baka tunnbröd vid älven
  date: '2026-06-23'
  start: '14:30'
  end: '16:30'
  location: Grillplats
  responsible: Charlotte Anderberg
  description: |
    Kom ner till grillplatsen vid älven och baka tunnbröd. I år kommer inspirationen från Restaurang Hantverket och Stefan Ekengren så det blir tuttul. Tuttul är ett mjukt, potatisbaserat tunnbröd från Dalarna, framför allt förknippat med Siljansbygden. 
    
    Deg finns färdig. Kavla, stek brödet på stekhäll över elden. Sen får man mumsa i sig med smör som smälter på det nybakade tunnbrödet. 
    
    Drop-in: tisdag kl. 14.30 till 16.30 eller att degen tar slut 
    
    Behöver man hjälp med att steka brödet är det bra med en förälder. 
    
    Receptet innehåller smör och vetemjöl, mjölken är laktosfri.
