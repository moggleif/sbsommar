  description: |
    Vi spelar innebandy på en liten plan med småmål. Klubbor finns det gott om, jag har även med ett antal barnklubbor. Det bästa är ifall alla har skor, annars får vi försöka lösa det. Vi kör 3 mot 3 med max tre avbytare per lag. Vi försöker få till jämna lag och byter lag när ett av lagen fått 5 mål och vunnit med minst två mål. Jag brukar lägga alla klubbor i en hög och dela upp dem i två högar. Om det finns önskemål om medspelare så tas det i beaktning. 
    
    Vi behöver vara minst 6 spelare för att aktiviteten ska bli av. 
    
