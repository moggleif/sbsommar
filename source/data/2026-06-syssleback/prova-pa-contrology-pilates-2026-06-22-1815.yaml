  location: Annat
  responsible: Agnes Granberg
  description: |
    Joseph Pilates skapade en träningsform han kallade contrology - idag kallas det som levt vidare av hans sätt att tänka kring träning pilates.
    
    Prova på träningsformen pilates och lär dig samtidigt något om den spännande historien om vem Joseph Piates var och hans smarta tankar om kropp och träning som är aktuella än idag. 
    
    Vi hittar en lite lugn plats på gräset nedanför GA-hallen. Ta gärna med liggunderlag, filt, handduk. yogamatta eller liknande. För alla åldrar och alla nivåer - olika alternativ ges.
